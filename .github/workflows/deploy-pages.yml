name: Deploy Godot Web build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.1
  GODOT_RELEASE: stable
  GODOT_VERSION_DIR: 4.6.1.stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Godot editor
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          echo "GODOT_BIN=$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" >> "$GITHUB_ENV"
          chmod +x "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"

      - name: Download export templates
        run: |
          curl -L -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          unzip -q templates.tpz -d "$RUNNER_TEMP/templates"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          cp -r "$RUNNER_TEMP/templates/templates/." "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}/"

      - name: Show installed export templates
        run: |
          echo "GODOT_BIN=$GODOT_BIN"
          echo "Expected templates dir: $HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}" || true
          find "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}" -maxdepth 1 -type f | sort || true

      - name: Import assets
        run: |
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --import

      - name: Show export-related project settings
        run: |
          echo "== project.godot =="
          grep -nE "^\[application\]|^\[rendering\]|^\[dotnet\]|config/name|run/main_scene|config/features|renderer/rendering_method\.web|project/assembly_name" project.godot || true
          echo "== export_presets.cfg =="
          sed -n '1,200p' export_presets.cfg

      - name: Export Web build
        run: |
          set -o pipefail
          mkdir -p build/web
          "$GODOT_BIN" --headless --verbose --path "$GITHUB_WORKSPACE" --export-release "Web" build/web/index.html 2>&1 | tee build/web/export.log
          touch build/web/.nojekyll

      - name: Show export diagnostics on failure
        if: failure()
        run: |
          echo "== build/web/export.log =="
          cat build/web/export.log || true
          echo "== installed export templates =="
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}" || true
          find "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}" -maxdepth 1 -type f | sort || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

